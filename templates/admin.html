{% extends "base.html" %}
{% block title %}Admin — Feed the City{% endblock %}
{% block content %}

<!-- Login -->
<div id="admin-login" class="mt-8">
    <h2 class="text-lg font-semibold mb-3">Admin Login</h2>
    <form id="login-form" class="space-y-3">
        <input type="password" id="admin-password" placeholder="Password"
               class="w-full p-3 border rounded-lg">
        <button type="submit" class="w-full bg-gray-800 text-white p-3 rounded-lg font-semibold">
            Login
        </button>
    </form>
    <p id="login-error" class="text-red-600 text-sm mt-2 hidden"></p>
</div>

<!-- Admin Panel -->
<div id="admin-panel" class="hidden space-y-6">
    <h2 class="text-lg font-semibold">Recipe & Settings</h2>

    <!-- Target Toggle + Count -->
    <div class="bg-white rounded-xl shadow p-4">
        <div class="flex items-center justify-between mb-3">
            <label class="font-medium">Sandwich Target</label>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="target-toggle" class="w-5 h-5 accent-green-600">
                <span class="text-sm text-gray-600" id="toggle-label">Enabled</span>
            </label>
        </div>
        <input type="number" id="target-input" min="1" placeholder="Target sandwich count"
               class="w-full p-3 border rounded-lg text-lg">
    </div>

    <!-- Ingredients -->
    <div class="bg-white rounded-xl shadow p-4">
        <div class="flex justify-between items-center mb-3">
            <h3 class="font-medium">Ingredients (per sandwich)</h3>
            <button id="add-ingredient-btn" class="text-green-600 text-sm font-semibold">+ Add</button>
        </div>
        <div id="ingredients-editor" class="space-y-3"></div>
    </div>

    <!-- Save -->
    <button id="save-recipe-btn"
            class="w-full bg-green-600 text-white p-3 rounded-lg text-lg font-semibold hover:bg-green-700 transition">
        Save Recipe
    </button>
    <p id="save-status" class="text-sm text-center"></p>

    <!-- Danger Zone -->
    <div class="border border-red-200 rounded-xl p-4 mt-6">
        <h3 class="text-red-600 font-medium mb-2">Danger Zone</h3>
        <button id="reset-claims-btn"
                class="w-full bg-red-100 text-red-700 p-2 rounded-lg text-sm hover:bg-red-200 transition">
            Reset All Purchases
        </button>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => initAdmin());
</script>
{% endblock %}
