{% extends "base.html" %}
{% block title %}Dashboard — Feed the City{% endblock %}
{% block content %}

<h2 class="text-xl font-bold mb-4">Progress Dashboard</h2>

<!-- Per-Ingredient Progress -->
<div id="ingredient-progress" class="space-y-3 mb-6">
    <p class="text-gray-400 text-sm">Loading...</p>
</div>

<!-- Stats -->
<div class="bg-white rounded-xl shadow p-4 mb-4 text-center">
    <div class="text-2xl font-bold text-green-700" id="dash-purchase-count">0</div>
    <div class="text-gray-500 text-sm">total purchase logs</div>
</div>

<!-- Recent Purchases -->
<div class="bg-white rounded-xl shadow p-4">
    <h3 class="font-semibold mb-3">Recent Purchases</h3>
    <div id="purchases-list" class="space-y-2 text-sm"></div>
    <p id="no-purchases" class="text-gray-400 text-sm hidden">No purchases yet</p>
</div>

{% endblock %}
{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => initDashboard());
</script>
{% endblock %}
